<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thunderbax Wallpaper finder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .modal-active { overflow: hidden; }
        .masonry-grid { columns: 1; gap: 1.5rem; }
        @media (min-width: 768px) { .masonry-grid { columns: 2; } }
        @media (min-width: 1024px) { .masonry-grid { columns: 3; } }
        .img-card { break-inside: avoid; margin-bottom: 1.5rem; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans">

    <header class="sticky top-0 z-40 bg-gray-900/80 backdrop-blur-md border-b border-gray-800 p-6">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-black tracking-tighter text-blue-500">THUNDERBAX<span class="text-white">WALL</span></h1>
            
            <div class="flex w-full md:w-auto gap-2">
                <input type="text" id="search-input" placeholder="Cerca es. 'dark rock'..." 
                    class="bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 w-full md:w-64 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="searchNew()" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg font-bold transition">Cerca</button>
            </div>
        </div>
    </header>

    <main class="p-6 max-w-7xl mx-auto">
        <div id="gallery" class="masonry-grid">
            </div>

        <div class="flex justify-center mt-12 mb-20">
            <button id="load-more" onclick="loadWallpapers()" 
                class="bg-gray-800 hover:bg-gray-700 border border-gray-700 px-8 py-3 rounded-full font-semibold transition flex items-center gap-2">
                <span>Mostra altri</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
            </button>
        </div>
    </main>

    <div id="modal" class="fixed inset-0 bg-black/95 hidden z-50 flex flex-col items-center justify-center p-4 cursor-pointer" onclick="closeModal()">
        <div class="absolute top-5 right-5 text-gray-400 hover:text-white text-5xl">&times;</div>
        
        <div class="relative group cursor-default" onclick="event.stopPropagation()">
            <img id="modal-img" src="" alt="Preview" class="max-h-[80vh] max-w-full rounded shadow-2xl border border-gray-800">
            <div class="absolute bottom-4 right-4 opacity-0 group-hover:opacity-100 transition-opacity">
                <span class="bg-black/50 px-3 py-1 rounded text-xs">2560 x 1600+</span>
            </div>
        </div>

        <div class="mt-8 flex gap-4" onclick="event.stopPropagation()">
            <a id="download-btn" href="#" target="_blank" download 
               class="bg-blue-600 hover:bg-blue-700 text-white px-10 py-3 rounded-full font-bold shadow-lg transition transform hover:scale-105">
                SCARICA RISOLUZIONE MASSIMA
            </a>
        </div>
    </header>

    <script>
        const ACCESS_KEY = 'zvgZweRY1Rje_5y_gbl4EhAALsfz3wihw9KULtXgFnI'; // <--- METTI QUI LA TUA CHIAVE
        let currentQuery = 'wallpaper,landscape';

        async function loadWallpapers(isNewSearch = false) {
            const gallery = document.getElementById('gallery');
            const btn = document.getElementById('load-more');
            
            if (isNewSearch) gallery.innerHTML = '<p class="text-center col-span-full">Caricamento...</p>';
            btn.innerText = 'Caricamento...';

            try {
                // Cerchiamo foto landscape ad alta risoluzione
                const response = await fetch(`https://api.unsplash.com/photos/random?count=12&query=${currentQuery}&orientation=landscape&client_id=${ACCESS_KEY}`);
                const data = await response.json();

                if (isNewSearch) gallery.innerHTML = '';

                data.forEach(img => {
                    const card = document.createElement('div');
                    card.className = 'img-card group relative overflow-hidden rounded-xl bg-gray-800';
                    
                    // Usiamo la versione 'regular' per la griglia e 'full' per il download/modal
                    card.innerHTML = `
                        <img src="${img.urls.regular}" 
                             alt="${img.alt_description}"
                             class="w-full h-auto cursor-zoom-in group-hover:scale-105 transition duration-500"
                             onclick="openModal('${img.urls.full}')">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none p-4 flex items-end">
                            <p class="text-sm font-medium">By ${img.user.name}</p>
                        </div>
                    `;
                    gallery.appendChild(card);
                });
            } catch (err) {
                console.error("Errore:", err);
                alert("Assicurati di aver inserito correttamente l'Access Key nel codice!");
            } finally {
                btn.innerHTML = '<span>Mostra altri</span>';
            }
        }

        function searchNew() {
            const input = document.getElementById('search-input').value;
            if (input.trim() !== "") {
                currentQuery = input;
                loadWallpapers(true);
            }
        }

        function openModal(url) {
            const modal = document.getElementById('modal');
            const modalImg = document.getElementById('modal-img');
            const downloadBtn = document.getElementById('download-btn');
            
            modalImg.src = url;
            downloadBtn.href = url;
            modal.classList.remove('hidden');
            document.body.classList.add('modal-active');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.body.classList.remove('modal-active');
        }

        // Gestione tasto Invio nella ricerca
        document.getElementById('search-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchNew();
        });

        // Avvio iniziale
        loadWallpapers();
    </script>
</body>
</html>
