<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thunderbax.org | Dashboard</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #3b82f6; /* Blu moderno, ma puoi cambiarlo in #ef4444 per un rosso rock */
            --text-color: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p.subtitle {
            color: #94a3b8;
            margin-bottom: 3rem;
        }

        .container {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            width: 280px;
            text-align: center;
            text-decoration: none;
            color: inherit;
            border: 1px solid transparent;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .card:hover {
            border-color: var(--accent-color);
            transform: translateY(-5px);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
        }

        .card h2 {
            margin-top: 0;
            color: var(--accent-color);
        }

        .card p {
            font-size: 0.9rem;
            color: #cbd5e1;
        }

        footer {
            margin-top: 4rem;
            font-size: 0.8rem;
            color: #64748b;
        }
    </style>
</head>
<body>

    <h1>Thunderbax</h1>
    <p class="subtitle">Sviluppo Web & Progetti Digitali</p>

    <div class="container">
        <a href="wallpaper.html" class="card">
            <h2>Wallpaper</h2>
            <p>Esplora la collezione di sfondi personalizzati.</p>
        </a>

        <a href="abadonware.html" class="card">
            <h2>Abadonware</h2>
            <p>Un tuffo nel passato con software e risorse d'epoca.</p>
        </a>
    </div>

    <footer>
        &copy; 2026 Thunderbax.org - Made with passion in Marnate
    </footer>

</body>
</html>
