<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thunderbax.org | Steampunk Hub</title>
    <style>
        :root {
            --bronze: #a86b32;
            --gold: #d4af37;
            --rust: #8b4513;
            --glass: rgba(30, 20, 15, 0.75);
        }

        body {
            font-family: 'Garamond', serif;
            /* Estensione corretta in .png come richiesto */
            background: url('logo steampunk.png') no-repeat center center fixed;
            background-size: cover;
            color: #f1e7d0;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Scurisce leggermente lo sfondo per far risaltare tutto il contenuto */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: -1;
        }

        header {
            text-align: center;
            margin-top: 4rem;
            z-index: 20;
            /* Crea una zona d'ombra radiale dietro il titolo per isolarlo dai dettagli del PNG */
            background: radial-gradient(circle, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 70%);
            padding: 40px 0;
            width: 100%;
        }

        h1 {
            font-size: 5rem; /* Titolo imponente */
            margin: 0;
            color: var(--gold);
            letter-spacing: 8px;
            text-transform: uppercase;
            font-weight: bold;
            /* Multi-ombra per staccare le lettere dallo sfondo complesso */
            text-shadow: 
                4px 4px 0px rgba(0,0,0,1), 
                -1px -1px 0px rgba(0,0,0,1),
                0px 0px 30px rgba(168, 107, 50, 0.6); 
            border-bottom: 4px solid var(--bronze);
            display: inline-block;
            padding-bottom: 10px;
        }

        .subtitle {
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 1.3rem;
            margin-top: 20px;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 4px;
            /* Effetto etichetta industriale */
            background: rgba(139, 69, 19, 0.5);
            padding: 8px 25px;
            border-radius: 3px;
            text-shadow: 2px 2px 4px rgba(0,0,0,1);
            display: inline-block;
        }

        /* Container per le card ai lati */
        .card-container {
            position: absolute;
            top: 55%;
            transform: translateY(-50%);
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 6%;
            box-sizing: border-box;
            z-index: 10;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 2.5rem;
            border-radius: 12px;
            width: 280px;
            text-align: center;
            text-decoration: none;
            color: #f1e7d0;
            border: 2px solid var(--bronze);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card:hover {
            transform: scale(1.08);
            border-color: var(--gold);
            background: rgba(168, 107, 50, 0.3);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.4);
        }

        .card h2 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
            color: var(--gold);
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .card p {
            line-height: 1.6;
            font-size: 1rem;
            opacity: 0.9;
        }

        .btn-link {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: var(--bronze);
            color: white;
            border-radius: 4px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.8rem;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }

        footer {
            margin-bottom: 2rem;
            font-size: 0.8rem;
            color: var(--gold);
            background: rgba(0,0,0,0.6);
            padding: 8px 20px;
            border-radius: 30px;
            letter-spacing: 1px;
            z-index: 20;
        }

        /* Ottimizzazione Mobile */
        @media (max-width: 900px) {
            h1 { font-size: 3rem; }
            .card-container {
                position: static;
                transform: none;
                flex-direction: column;
                align-items: center;
                gap: 2rem;
                padding: 3rem 0;
            }
            header { margin-top: 2rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Thunderbax</h1>
        <br>
        <p class="subtitle">Laboratorio Digitale & Ingranaggi Creativi</p>
    </header>

    <div class="card-container">
        <a href="wallpaper.html" class="card">
            <h2>Wallpaper</h2>
            <p>Galleria di visioni digitali e sfondi creati su misura.</p>
            <div class="btn-link">Entra</div>
        </a>

        <a href="abadonware.html" class="card">
            <h2>Abadonware</h2>
            <p>Recupero di software dal passato e archeologia informatica.</p>
            <div class="btn-link">Accedi</div>
        </a>
    </div>

    <footer>
        &copy; 2026 Thunderbax.org - Pasticci di codice
    </footer>

</body>
</html>
