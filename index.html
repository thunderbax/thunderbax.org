<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thunderbax.org | Steampunk Hub</title>
    <style>
        :root {
            --bronze: #a86b32;
            --gold: #d4af37;
            --rust: #8b4513;
            --glass: rgba(30, 20, 15, 0.75);
        }

        body {
            font-family: 'Garamond', serif;
            background: url('logo steampunk.png') no-repeat center center fixed;
            background-size: cover;
            color: #f1e7d0;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: -1;
        }

        /* WIDGET SUPERIORI */
        .top-widgets {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 30px;
            box-sizing: border-box;
            z-index: 30;
        }

        .widget-box {
            background: var(--glass);
            border: 1px solid var(--bronze);
            padding: 10px 15px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            color: var(--gold);
            font-size: 1.1rem;
            text-shadow: 1px 1px 2px black;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        header {
            text-align: center;
            margin-top: 6rem;
            z-index: 20;
            background: radial-gradient(circle, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 70%);
            padding: 40px 0;
            width: 100%;
        }

        h1 {
            font-size: 5rem;
            margin: 0;
            color: var(--gold);
            letter-spacing: 8px;
            text-transform: uppercase;
            font-weight: bold;
            text-shadow: 4px 4px 0px rgba(0,0,0,1), -1px -1px 0px rgba(0,0,0,1), 0px 0px 30px rgba(168, 107, 50, 0.6); 
            border-bottom: 4px solid var(--bronze);
            display: inline-block;
            padding-bottom: 10px;
        }

        .subtitle {
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 1.3rem;
            margin-top: 20px;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 4px;
            background: rgba(139, 69, 19, 0.5);
            padding: 8px 25px;
            border-radius: 3px;
            text-shadow: 2px 2px 4px rgba(0,0,0,1);
            display: inline-block;
        }

        .card-container {
            position: absolute;
            top: 55%;
            transform: translateY(-50%);
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 6%;
            box-sizing: border-box;
            z-index: 10;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            padding: 2.5rem;
            border-radius: 12px;
            width: 280px;
            text-align: center;
            text-decoration: none;
            color: #f1e7d0;
            border: 2px solid var(--bronze);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card:hover {
            transform: scale(1.08);
            border-color: var(--gold);
            background: rgba(168, 107, 50, 0.3);
        }

        footer {
            margin-bottom: 2rem;
            font-size: 0.8rem;
            color: var(--gold);
            background: rgba(0,0,0,0.6);
            padding: 8px 20px;
            border-radius: 30px;
            z-index: 20;
        }

        @media (max-width: 900px) {
            h1 { font-size: 2.5rem; }
            .card-container { position: static; transform: none; flex-direction: column; align-items: center; gap: 2rem; padding: 3rem 0; }
            .top-widgets { position: relative; flex-direction: column; align-items: center; gap: 10px; top: 10px; padding: 0; }
        }
    </style>
</head>
<body>

    <div class="top-widgets">
        <div id="clock" class="widget-box">00:00:00</div>
        <div id="weather" class="widget-box">Caricamento meteo...</div>
    </div>

    <header>
        <h1>Thunderbax</h1>
        <br>
        <p class="subtitle">Laboratorio Digitale & Ingranaggi Creativi</p>
    </header>

    <div class="card-container">
        <a href="wallpaper.html" class="card">
            <h2>Wallpaper</h2>
            <p>Galleria di visioni digitali e sfondi creati su misura.</p>
            <div style="margin-top:15px; background:var(--bronze); padding:8px; border-radius:4px; font-weight:bold;">Entra</div>
        </a>

        <a href="abadonware.html" class="card">
            <h2>Abadonware</h2>
            <p>Recupero di software dal passato e archeologia informatica.</p>
            <div style="margin-top:15px; background:var(--bronze); padding:8px; border-radius:4px; font-weight:bold;">Accedi</div>
        </a>
    </div>

    <footer>
        &copy; 2026 Thunderbax.org - Pasticci code
    </footer>

    <script>
        // OROLOGIO DINAMICO
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('it-IT');
        }
        setInterval(updateClock, 1000);
        updateClock();

        // METEO GEOLOCALIZZATO
        function getWeatherData() {
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(async (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    
                    try {
                        const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                        const data = await response.json();
                        const temp = Math.round(data.current_weather.temperature);
                        const code = data.current_weather.weathercode;
                        
                        // Semplice interpretazione dei codici meteo
                        let emoji = "☁️";
                        if (code === 0) emoji = "☀️";
                        else if (code <= 3) emoji = "🌤️";
                        else if (code >= 51 && code <= 67) emoji = "🌧️";
                        else if (code >= 71 && code <= 77) emoji = "❄️";
                        else if (code >= 95) emoji = "⚡";

                        document.getElementById('weather').textContent = `Local: ${temp}°C ${emoji}`;
                    } catch (error) {
                        document.getElementById('weather').textContent = "Meteo non disp.";
                    }
                }, () => {
                    // Se l'utente nega i permessi, mostriamo un default (es. Marnate)
                    document.getElementById('weather').textContent = "Marnate: 14°C 🌤️";
                });
            } else {
                document.getElementById('weather').textContent = "GPS non supportato";
            }
        }
        getWeatherData();
    </script>
</body>
</html>
