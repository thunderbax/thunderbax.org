<style>
    /* ... resto del CSS ... */

    header {
        text-align: center;
        margin-top: 3rem;
        z-index: 20;
        /* Creiamo una fascia scura sfumata dietro il titolo per isolarlo dallo sfondo */
        background: radial-gradient(ellipse at center, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 80%);
        padding: 40px 20px;
        width: 100%;
    }

    h1 {
        font-size: 4.5rem;
        margin: 0;
        color: var(--gold);
        letter-spacing: 6px;
        text-transform: uppercase;
        font-weight: bold;
        /* Triplo shadow: uno scuro per il distacco, uno bronzo per l'effetto bagliore */
        text-shadow: 
            3px 3px 0px rgba(0,0,0,1), 
            -1px -1px 0px rgba(0,0,0,1),
            0px 0px 20px rgba(168, 107, 50, 0.8); 
        border-bottom: 3px solid var(--bronze);
        display: inline-block;
        padding-bottom: 5px;
    }

    .subtitle {
        font-family: 'Courier New', Courier, monospace; /* Font stile macchina da scrivere */
        font-style: normal;
        font-weight: bold;
        font-size: 1.4rem;
        margin-top: 15px;
        color: #fff;
        text-transform: uppercase;
        letter-spacing: 3px;
        /* Ombra netta nera per rendere le lettere leggibili su qualsiasi colore */
        text-shadow: 2px 2px 4px rgba(0,0,0,1);
        background: rgba(139, 69, 19, 0.3); /* Un tocco di ruggine trasparente */
        display: inline-block;
        padding: 5px 20px;
        border-radius: 5px;
    }
    
    /* ... resto del CSS ... */
</style>

<header>
    <h1>Thunderbax</h1>
    <br>
    <p class="subtitle">Laboratorio Digitale & Ingranaggi Creativi</p>
</header>
